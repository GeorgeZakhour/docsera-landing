# Baseline security headers, included in the server block AND in every
# location that declares its own add_header. nginx's add_header does NOT
# inherit: a location with any add_header of its own silently drops all
# server-level headers, so each such location must re-include this file.
#
# Deliberately no Content-Security-Policy: the inline scripts/styles Astro
# emits would need nonces or hashes on every build, and the maintenance
# cost outweighs the benefit for a static site. Revisit if the site ever
# handles credentials.
#
# No includeSubDomains on HSTS: api/my/staging/mail subdomains are managed
# separately; scoping HSTS to this host avoids accidentally locking one of
# them out if it ever needs plain HTTP.

add_header Strict-Transport-Security "max-age=31536000" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

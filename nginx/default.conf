# Hide nginx version in error pages and the Server header.
server_tokens off;

server {
    listen       80;
    server_name  localhost;

    # Baseline security headers. NOTE: any location below that uses
    # add_header must re-include this file (add_header does not inherit
    # once a location defines its own).
    include /etc/nginx/snippets/security-headers.conf;

    # Branded 404 (built from src/pages/404.astro).
    error_page 404 /404.html;

    # Apple App Site Association + Android assetlinks must be served as
    # application/json. The AASA file has no extension so without this,
    # nginx defaults to application/octet-stream and Apple's verifier
    # rejects it. assetlinks.json already gets the right type via .json
    # but setting default_type here is harmless and keeps both consistent.
    location /.well-known/ {
        root /usr/share/nginx/html;
        default_type application/json;
        add_header Cache-Control "max-age=300";
        add_header Access-Control-Allow-Origin "*";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Astro's content-hashed bundles: the filename changes whenever the
    # content does, so these are safe to cache forever.
    location /_astro/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Static assets that are NOT content-hashed (fonts, images, icons).
    # 7 days: long enough that repeat visits on slow connections skip the
    # download, short enough that a replaced screenshot with the same
    # filename converges within a week. Rename the file when updating an
    # asset to bust this immediately.
    location ~* \.(woff2|webp|png|jpg|jpeg|svg|ico)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=604800";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Doctor deep-link landing page: serve a single static shell for every
    # /doctor/<token> URL. The page reads the token from window.location
    # client-side and fetches doctor info via public_doctors. Pre-rendering
    # one HTML per doctor would force a site rebuild every time a new doctor
    # joins; the single-shell pattern avoids that.
    location /doctor/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /doctor/index.html =404;
        # Short cache: the shell rarely changes, but we don't want a stale
        # bundle to outlive a site redeploy if we change the script.
        add_header Cache-Control "public, max-age=300";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Center deep-link landing page: same single-shell pattern as /doctor/.
    # Reads the center UUID from window.location, fetches via public_centers.
    location /center/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /center/index.html =404;
        add_header Cache-Control "public, max-age=300";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # APK distribution. Pretty aliases that 302-redirect to the signed APKs
    # hosted on Supabase storage inside Syria (the files exceed GitHub's
    # 100 MB per-file limit, so they are not committed here). 302 (not 301)
    # so the storage target can change without poisoning caches.
    location = /downloads/docsera.apk {
        return 302 https://api.docsera.app/storage/v1/object/public/app-downloads/DocSera-1.0.0.apk;
    }
    location = /downloads/docsera-pro.apk {
        return 302 https://api.docsera.app/storage/v1/object/public/app-downloads/DocSera-Pro-1.0.0.apk;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # HTML changes on every deploy; 5 minutes + etag revalidation keeps
        # Cloudflare/browsers close to fresh without hammering the origin.
        add_header Cache-Control "public, max-age=300";
        include /etc/nginx/snippets/security-headers.conf;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
